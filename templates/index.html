<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="CineBuddy – Watch movies together in perfect sync">
  <title>CineBuddy </title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #070710;
      --panel: #0f0f1d;
      --border: #1c1c30;
      --a: #c084fc;
      --a2: #818cf8;
      --text: #eaeaf5;
      --mu: #50506a;
      --mu2: #70708a;
      --green: #34d399;
      --red: #f87171;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem 3.5rem;
      background-image:
        radial-gradient(ellipse 65% 55% at 12% 22%, rgba(129, 140, 248, .10) 0%, transparent 65%),
        radial-gradient(ellipse 55% 65% at 88% 78%, rgba(192, 132, 252, .08) 0%, transparent 65%);
    }

    /* particles */
    .p {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: .14;
      animation: fl linear infinite
    }

    @keyframes fl {
      0% {
        transform: translateY(105vh)
      }

      100% {
        transform: translateY(-5vh) rotate(360deg)
      }
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      animation: su .5s ease both
    }

    @keyframes su {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 1.8rem
    }

    .logo-i {
      font-size: 3rem;
      display: block;
      margin-bottom: .25rem;
      filter: drop-shadow(0 0 16px rgba(192, 132, 252, .5));
      animation: glo 3s ease-in-out infinite
    }

    @keyframes glo {

      0%,
      100% {
        filter: drop-shadow(0 0 16px rgba(192, 132, 252, .45))
      }

      50% {
        filter: drop-shadow(0 0 28px rgba(192, 132, 252, .85))
      }
    }

    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .logo p {
      color: var(--mu);
      font-size: .83rem;
      margin-top: .2rem
    }

    /* Card */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.8rem;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .55), 0 0 0 1px rgba(255, 255, 255, .02)
    }

    label {
      display: block;
      font-size: .68rem;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: .38rem;
      font-weight: 500
    }

    input[type=text] {
      width: 100%;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: .75rem .95rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s
    }

    input[type=text]:focus {
      border-color: var(--a);
      box-shadow: 0 0 0 3px rgba(192, 132, 252, .1)
    }

    input::placeholder {
      color: var(--mu)
    }

    .ig {
      margin-bottom: 1.2rem
    }

    .btn {
      width: 100%;
      padding: .85rem;
      border-radius: 9px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem
    }

    .btn-p {
      background: linear-gradient(135deg, #c084fc, #818cf8);
      color: #fff;
      box-shadow: 0 4px 18px rgba(192, 132, 252, .3)
    }

    .btn-p:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 26px rgba(192, 132, 252, .46)
    }

    .btn-p:active {
      transform: none
    }

    .btn-o {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: .55rem
    }

    .btn-o:hover {
      border-color: var(--a);
      color: var(--a);
      background: rgba(192, 132, 252, .05)
    }

    .div {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.3rem 0
    }

    .div::before,
    .div::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    .div span {
      color: var(--mu);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap
    }

    .jrow {
      display: flex;
      gap: .45rem
    }

    .jrow input {
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 2px
    }

    .jbtn {
      flex-shrink: 0;
      padding: .75rem .95rem;
      border-radius: 9px;
      border: 1px solid rgba(129, 140, 248, .28);
      background: rgba(129, 140, 248, .07);
      color: var(--a2);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap
    }

    .jbtn:hover {
      background: rgba(129, 140, 248, .17)
    }

    /* Created panel */
    .rcp {
      display: none;
      margin-top: .9rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(192, 132, 252, .18);
      animation: su .3s ease
    }

    .rci {
      padding: .9rem 1rem;
      background: rgba(192, 132, 252, .04)
    }

    .rcl {
      font-size: .64rem;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: .4rem
    }

    .rcc {
      font-family: 'Syne', monospace;
      font-size: 2rem;
      font-weight: 800;
      color: var(--a);
      letter-spacing: 7px;
      text-align: center;
      padding: .4rem;
      cursor: pointer;
      border-radius: 7px;
      transition: background .2s;
      user-select: all
    }

    .rcc:hover {
      background: rgba(192, 132, 252, .1)
    }

    .rcs {
      font-size: .7rem;
      color: var(--mu);
      text-align: center;
      margin-top: .18rem
    }

    /* Share info */
    .shbox {
      display: none;
      border-top: 1px solid rgba(52, 211, 153, .14);
      padding: .9rem 1rem;
      background: rgba(52, 211, 153, .04)
    }

    .shbox h4 {
      font-size: .68rem;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: .65rem;
      display: flex;
      align-items: center;
      gap: .35rem
    }

    .step {
      display: flex;
      gap: .5rem;
      margin-bottom: .55rem;
      align-items: flex-start
    }

    .sn {
      width: 18px;
      height: 18px;
      min-width: 18px;
      background: rgba(52, 211, 153, .1);
      border: 1px solid rgba(52, 211, 153, .26);
      border-radius: 50%;
      font-size: .62rem;
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-top: .1rem
    }

    .step p {
      font-size: .75rem;
      color: var(--mu2);
      line-height: 1.55
    }

    .step p strong {
      color: var(--text)
    }

    .ic {
      background: rgba(255, 255, 255, .06);
      padding: .08rem .3rem;
      border-radius: 4px;
      font-size: .72rem;
      color: var(--a2);
      font-family: monospace
    }

    .ipu {
      display: inline-flex;
      align-items: center;
      gap: .28rem;
      background: rgba(129, 140, 248, .07);
      border: 1px solid rgba(129, 140, 248, .2);
      color: var(--a2);
      padding: .16rem .48rem;
      border-radius: 5px;
      font-size: .73rem;
      font-family: monospace;
      cursor: pointer;
      margin-top: .2rem;
      transition: all .2s
    }

    .ipu:hover {
      background: rgba(129, 140, 248, .16)
    }

    /* Features */
    .feats {
      display: flex;
      justify-content: center;
      gap: .9rem;
      margin-top: 1.1rem;
      flex-wrap: wrap
    }

    .feat {
      font-size: .72rem;
      color: var(--mu);
      display: flex;
      align-items: center;
      gap: .25rem
    }

    /* Dev credit */
    .dev {
      margin-top: 1.4rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .38rem
    }

    .dev-t {
      font-size: .7rem;
      color: var(--mu);
      letter-spacing: .3px
    }

    .dev-a {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: linear-gradient(135deg, rgba(225, 48, 108, .1), rgba(253, 121, 168, .07));
      border: 1px solid rgba(225, 48, 108, .22);
      color: #f06292;
      padding: .3rem .75rem;
      border-radius: 50px;
      font-size: .75rem;
      font-weight: 500;
      text-decoration: none;
      transition: all .25s;
      letter-spacing: .3px
    }

    .dev-a:hover {
      background: linear-gradient(135deg, rgba(225, 48, 108, .2), rgba(253, 121, 168, .13));
      border-color: rgba(225, 48, 108, .45);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(225, 48, 108, .18)
    }

    /* Error */
    .err {
      display: none;
      color: var(--red);
      font-size: .76rem;
      margin-top: .45rem;
      text-align: center
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.3rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .52rem 1.1rem;
      border-radius: 50px;
      font-size: .78rem;
      transition: transform .28s;
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .4)
    }

    .toast.on {
      transform: translateX(-50%) translateY(0)
    }

    @media(max-width:480px) {
      .logo h1 {
        font-size: 2.1rem
      }

      .card {
        padding: 1.4rem
      }

      .rcc {
        font-size: 1.65rem;
        letter-spacing: 5px
      }
    }
  </style>
</head>

<body>
  <!-- Floating particles -->
  <div class="p" style="width:4px;height:4px;background:#c084fc;left:8%;animation-duration:19s;animation-delay:0s">
  </div>
  <div class="p" style="width:3px;height:3px;background:#818cf8;left:28%;animation-duration:23s;animation-delay:5s">
  </div>
  <div class="p" style="width:5px;height:5px;background:#c084fc;left:54%;animation-duration:17s;animation-delay:9s">
  </div>
  <div class="p" style="width:3px;height:3px;background:#818cf8;left:74%;animation-duration:21s;animation-delay:3s">
  </div>
  <div class="p" style="width:4px;height:4px;background:#c084fc;left:91%;animation-duration:25s;animation-delay:7s">
  </div>

  <div class="wrap">
    <div class="logo">
      <h1>CineBuddy</h1>
      <p>Watch movies together, wherever you are</p>
    </div>

    <div class="card">
      <div class="ig">
        <label>Your Name</label>
        <input type="text" id="uname" placeholder="Enter your name…" maxlength="20" autocomplete="off"
          spellcheck="false">
      </div>

      <button class="btn btn-p" onclick="createRoom()">✨ Create New Room</button>

      <!-- Room created -->
      <div class="rcp" id="rcp">
        <div class="rci">
          <div class="rcl">Room Code — share this with your friend</div>
          <div class="rcc" id="rcc" onclick="copyCode()" title="Tap to copy">——</div>
          <div class="rcs">👆 Tap code to copy</div>
        </div>
        <div class="shbox" id="shbox">

        </div>
      </div>

      <button class="btn btn-o" id="enterbtn" style="display:none" onclick="enterRoom()">
        🚪 Enter Room →
      </button>

      <div class="div"><span>or join existing room</span></div>

      <div class="jrow">
        <input type="text" id="jcode" placeholder="Room code e.g. ABC123" maxlength="8" autocomplete="off"
          spellcheck="false" onkeydown="if(event.key==='Enter')joinRoom()">
        <button class="jbtn" onclick="joinRoom()">Join →</button>
      </div>
      <p class="err" id="err"></p>
    </div><!-- /card -->

    <div class="feats">
      <div class="feat">🎥 YouTube sync</div>
      <div class="feat">📁 Local videos</div>
      <div class="feat">📤 Upload videos</div>
      <div class="feat">📹 Video call</div>
      <div class="feat">💬 Private chat</div>
    </div>

    <!-- Developer Credit -->
    <div class="dev">
      <div class="dev-t">Developed by</div>
      <a class="dev-a" href="https://www.instagram.com/____sourarup______/" target="_blank" rel="noopener noreferrer">
        📸 <span>Sourarup</span>
      </a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    'use strict';
    let roomId = '', lanBase = '';

    fetch('/api/server-info').then(r => r.json()).then(d => {
      lanBase = d.local_url || '';
    }).catch(() => {});

    function rnd() {
      const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      return Array.from({ length: 6 }, () => c[Math.random() * c.length | 0]).join('');
    }

    function getUser() {
      const v = document.getElementById('uname').value.trim();
      if (!v) { showErr('Please enter your name!'); return null; }
      if (v.length > 20) { showErr('Name must be 20 chars or less'); return null; }
      return v;
    }

    function showErr(m) {
      const e = document.getElementById('err');
      e.textContent = m; e.style.display = 'block';
      setTimeout(() => e.style.display = 'none', 3000);
    }

    function createRoom() {
      if (!getUser()) return;
      roomId = rnd();
      document.getElementById('rcc').textContent = roomId;
      document.getElementById('rcp').style.display = 'block';
      document.getElementById('enterbtn').style.display = 'flex';
    }

    function copyCode() {
      navigator.clipboard.writeText(roomId).catch(() => { });
      showToast('📋 Copied: ' + roomId);
    }

    function copyIp() {
      navigator.clipboard.writeText(lanBase).catch(() => { });
      showToast('🔗 URL copied!');
    }

    function enterRoom() {
      const u = getUser(); if (!u) return;
      sessionStorage.setItem('cb_user', u);
      window.location.href = '/room/' + roomId;
    }

    function joinRoom() {
      const u = getUser(); if (!u) return;
      const c = document.getElementById('jcode').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (c.length < 4) { showErr('Enter a valid room code!'); return; }
      sessionStorage.setItem('cb_user', u);
      window.location.href = '/room/' + c;
    }

    function showToast(m) {
      const t = document.getElementById('toast');
      t.textContent = m; t.classList.add('on');
      setTimeout(() => t.classList.remove('on'), 2300);
    }

    // Pre-fill saved name
    const saved = sessionStorage.getItem('cb_user');
    if (saved) document.getElementById('uname').value = saved;
    document.getElementById('uname').focus();

    // Allow Enter on join code field
    document.getElementById('jcode').addEventListener('input', function () {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });
  </script>
</body>

</html>
